<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple and intuitive to‑do list app designed to help you stay organized, boost productivity, and manage tasks effortlessly.">
    <meta name="keywords" content="to-do list, task manager, productivity app, daily planner, task tracker, checklist app, reminders, organize tasks, schedule tasks, personal organizer">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/64038fda00.js" crossorigin="anonymous"></script>

    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Todo App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER: App title + input field -->
    <header>
        <div class="container">
            <h1>Todo</h1>

            <div id="input-container">
                <input 
                    type="text" 
                    id="new-task" 
                    placeholder="Create a new todo..." 
                    aria-label="Create a new todo"
                >

                <!-- Use a button for accessibility -->
                <button id="add-task" aria-label="Add new task">Add</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <section>
            <div class="container">

                <!-- Task List -->
                <ul id="task-list">
                    <!-- Example tasks (optional placeholders) -->
                    <li class="completed">
                        <i class="fa-solid fa-check"></i>
                        <span>10 minutes meditation</span>
                    </li>

                    <li class="completed">
                        <i class="fa-solid fa-check"></i>
                        <span>Read for an hour</span>
                    </li>

                    <li>
                        <i class="fa-solid fa-check"></i>
                        <span>Complete online JavaScript course</span>
                    </li>
                </ul>

                <!-- FOOTER: Filters + Clear button -->
                <footer>
                    <div class="footer-controls">
                        <p id="tasks-left"><span></span> tasks left</p>

                        <div class="filters">
                            <button class="filter active" id="show-all">All</button>
                            <button class="filter" id="show-active">Active</button>
                            <button class="filter" id="show-completed">Completed</button>
                        </div>

                        <button id="clear-completed">Clear Completed</button>
                    </div>
                </footer>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
